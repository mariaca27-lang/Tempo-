<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Mapa de Tiempo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0;}body{background:#FBF7F0;font-family:'Nunito',sans-serif;}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef}=React;
const C={sand:"#F5EFE0",cream:"#FBF7F0",terra:"#C97B4B",terraL:"#E8A97A",sage:"#7A9E87",sageL:"#A8C5B0",rose:"#D4756B",roseL:"#E8A09A",gold:"#D4A853",sky:"#6B9EC9",skyL:"#A0C4E0",ink:"#2D2A26",inkL:"#5C5650",mist:"#EDE8DF"};
const ZONES={potenciar:{label:"Potenciar",desc:"Alto valor · me nutre",color:C.sage,bg:"#EDF5F0",icon:"✨"},optimizar:{label:"Optimizar",desc:"Alto valor · necesaria",color:C.sky,bg:"#EEF4FA",icon:"⚙️"},delegar:{label:"Delegar",desc:"Alto valor · me drena",color:C.gold,bg:"#FDF6E3",icon:"🤝"},reducir:{label:"Reducir",desc:"Bajo valor · me nutre o necesaria",color:C.terra,bg:"#FDF3EB",icon:"⚡"},eliminar:{label:"Eliminar",desc:"Bajo valor · me drena",color:C.rose,bg:"#FBF0EF",icon:"🗑️"}};
const ENERGY_OPTS=[{key:"nutre",icon:"🌿",label:"Me nutre",desc:"Lo hago con gusto"},{key:"necesaria",icon:"⚙️",label:"Es necesaria",desc:"Neutral, toca hacerlo"},{key:"drena",icon:"😮‍💨",label:"Me drena",desc:"Me cuesta energía"}];
const FOCUS_OPTS=[{key:"flow",icon:"🎯",label:"Fluí",desc:"Enfocado/a, eficiente"},{key:"medium",icon:"😐",label:"Regular",desc:"Me dispersé un poco"},{key:"lost",icon:"🌀",label:"Me perdí",desc:"Tardé más de lo necesario"}];
const CATS=["Trabajo creativo","Aprendizaje","Salud & cuerpo","Relaciones","Mascotas","Administración","Ocio","Hogar","Otro"];
const fmt=(m)=>{const h=Math.floor(m/60),n=m%60;if(h===0)return n+"m";return n===0?h+"h":h+"h"+n+"m"};
const getMins=(s,e)=>Math.max(0,Math.round((new Date(e)-new Date(s))/60000));
const todayStr=()=>new Date().toDateString();
const getZone=(v,e)=>{if(v==="high"&&e==="nutre")return"potenciar";if(v==="high"&&e==="necesaria")return"optimizar";if(v==="high"&&e==="drena")return"delegar";if(v==="low"&&e==="drena")return"eliminar";return"reducir"};
const Tag=({children,color,bg})=><span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"3px 10px",borderRadius:100,fontSize:11,fontWeight:600,letterSpacing:"0.04em",color,background:bg||color+"22"}}>{children}</span>;
const Pill=({label,active,color,onClick})=><button onClick={onClick} style={{border:"2px solid "+(active?color:C.mist),background:active?color+"18":"white",color:active?color:C.inkL,borderRadius:100,padding:"8px 14px",fontSize:13,fontWeight:active?700:400,cursor:"pointer",transition:"all .2s",fontFamily:"inherit",whiteSpace:"nowrap"}}>{label}</button>;
const CPill=({opt,active,color,onClick})=><button onClick={onClick} style={{flex:1,border:"2px solid "+(active?color:C.mist),background:active?color+"15":"white",color:active?color:C.inkL,borderRadius:14,padding:"10px 6px",fontSize:11,fontWeight:active?700:400,cursor:"pointer",transition:"all .2s",fontFamily:"inherit",textAlign:"center",lineHeight:1.4}}><div style={{fontSize:18,marginBottom:3}}>{opt.icon}</div><div style={{fontWeight:700}}>{opt.label}</div><div style={{fontSize:10,color:active?color:C.inkL,marginTop:2}}>{opt.desc}</div></button>;

function App(){
  const[entries,setEntries]=useState(()=>{try{return JSON.parse(localStorage.getItem("cye_v3")||"[]")}catch{return[]}});
  const[onboarded,setOnboarded]=useState(()=>!!localStorage.getItem("cye_v3_ob"));
  const[obStep,setObStep]=useState(0);
  const[obDef,setObDef]=useState("");
  const[view,setView]=useState("log");
  const[activeTimer,setActiveTimer]=useState(null);
  const[elapsed,setElapsed]=useState(0);
  const timerRef=useRef(null);
  const empty={activity:"",category:CATS[0],value:"high",energy:"nutre",focus:"flow",note:"",startTime:"",endTime:""};
  const[form,setForm]=useState(empty);
  useEffect(()=>{localStorage.setItem("cye_v3",JSON.stringify(entries))},[entries]);
  useEffect(()=>{if(activeTimer){timerRef.current=setInterval(()=>setElapsed(Math.round((Date.now()-new Date(activeTimer.startTime))/1000)),1000)}else{clearInterval(timerRef.current);setElapsed(0)}return()=>clearInterval(timerRef.current)},[activeTimer]);
  const finishOb=()=>{localStorage.setItem("cye_v3_ob",obDef||"mis metas");setOnboarded(true)};
  const startTimer=()=>{if(!form.activity.trim())return;setActiveTimer({...form,startTime:new Date().toISOString()})};
  const stopTimer=()=>{if(!activeTimer)return;setEntries(p=>[{...activeTimer,endTime:new Date().toISOString(),id:Date.now()},...p]);setActiveTimer(null);setForm(empty)};
  const addManual=()=>{if(!form.activity.trim()||!form.startTime||!form.endTime)return;setEntries(p=>[{...form,id:Date.now()},...p]);setForm(empty);setView("log")};
  const del=(id)=>setEntries(p=>p.filter(e=>e.id!==id));
  const elFmt=()=>{const h=Math.floor(elapsed/3600),m=Math.floor((elapsed%3600)/60),s=elapsed%60;return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")};
  const todayE=entries.filter(e=>new Date(e.startTime).toDateString()===todayStr());
  const totalT=todayE.reduce((a,e)=>a+getMins(e.startTime,e.endTime),0);
  const zoneData={};
  entries.forEach(e=>{const k=getZone(e.value,e.energy);if(!zoneData[k])zoneData[k]={mins:0,items:[]};const m=getMins(e.startTime,e.endTime);zoneData[k].mins+=m;zoneData[k].items.push({...e,mins:m})});
  const maxMins=Math.max(...Object.values(zoneData).map(d=>d.mins),1);
  const totalAll=Object.values(zoneData).reduce((a,d)=>a+d.mins,0)||1;
  const getInsights=()=>{
    if(entries.length<2)return null;
    const ins=[];
    const highLost=entries.filter(e=>e.value==="high"&&e.focus==="lost");
    if(highLost.length>=2){const names=[...new Set(highLost.map(e=>e.activity))].slice(0,2).join(" y ");const m=highLost.reduce((a,e)=>a+getMins(e.startTime,e.endTime),0);ins.push('🌀 En "'+names+'" llevas '+fmt(m)+' donde sientes que te pierdes — y son actividades que valoras. Puede valer la pena estructurar mejor ese tiempo.')}
    if((zoneData["eliminar"]||{mins:0}).mins/totalAll>0.2)ins.push("🗑️ Más del 20% de tu tiempo va a actividades de bajo valor que además te drenan. Ese es el primer lugar donde recuperar energía.");
    const d=zoneData["delegar"];if(d&&d.mins/totalAll>0.15){const top=d.items.sort((a,b)=>b.mins-a.mins)[0];ins.push('🤝 "'+top.activity+'" ocupa tiempo valioso pero te drena. ¿Hay alguien a quien puedas delegarlo?')}
    const o=zoneData["optimizar"];if(o&&o.mins/totalAll>0.25){const top=o.items.sort((a,b)=>b.mins-a.mins)[0];ins.push('⚙️ "'+top.activity+'" ocupa mucho espacio. Es de alto valor pero neutral — ¿puedes hacerla más eficiente?')}
    if((zoneData["potenciar"]||{mins:0}).mins/totalAll>0.4)ins.push("✨ Más del 40% de tu tiempo va a lo que más te nutre y más valor tiene. Sigue en esa dirección.");
    if(ins.length===0)ins.push("🌿 Sigue registrando unos días más. Cuando haya más datos, el análisis será más preciso y personalizado.");
    return ins;
  };
  const insights=getInsights();
  const css=`
    .card{background:white;border-radius:20px;padding:18px;box-shadow:0 2px 16px rgba(0,0,0,0.06);}
    .inf{background:#F5EFE0;border:2px solid #EDE8DF;border-radius:14px;padding:12px 16px;color:#2D2A26;font-family:inherit;font-size:14px;width:100%;outline:none;transition:border .2s;}
    .inf:focus{border-color:#C97B4B;} select.inf{appearance:none;cursor:pointer;}
    .bmain{background:#C97B4B;color:white;border:none;border-radius:100px;padding:14px 28px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;width:100%;box-shadow:0 4px 16px #C97B4B44;transition:all .2s;}
    .bmain:hover{background:#E8A97A;} .bmain:disabled{background:#EDE8DF;color:#5C5650;box-shadow:none;cursor:not-allowed;}
    .bstop{background:#D4756B!important;box-shadow:0 4px 16px #D4756B44!important;}
    .nav{background:none;border:none;cursor:pointer;padding:10px 0;font-family:inherit;font-size:11px;font-weight:800;letter-spacing:0.07em;text-transform:uppercase;border-bottom:3px solid transparent;transition:all .2s;}
    .lbl{font-size:11px;font-weight:800;color:#5C5650;letter-spacing:0.07em;display:block;margin-bottom:8px;}
    .dbtn{background:none;border:none;cursor:pointer;color:#EDE8DF;font-size:18px;padding:4px;line-height:1;transition:color .2s;}
    .dbtn:hover{color:#D4756B;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .fu{animation:fadeUp .35s ease both;} .pu{animation:pulse 2s infinite;}
    ::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-thumb{background:#EDE8DF;border-radius:4px;}
  `;

  if(!onboarded)return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#FBF7F0,#F5EFE0)",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <style>{css}</style>
      <div style={{maxWidth:400,width:"100%",textAlign:"center",fontFamily:"'Lora',serif"}}>
        {obStep===0&&<div><div style={{fontSize:52,marginBottom:20}}>🌿</div><h1 style={{fontSize:26,fontWeight:600,color:C.ink,marginBottom:14,lineHeight:1.4}}>Hola, empecemos.</h1><p style={{fontSize:15,color:C.terra,lineHeight:1.9,marginBottom:14,fontStyle:"italic"}}>"Sé consciente de tu tiempo.<br/>Solo así puedes elegir cómo usarlo."</p><p style={{fontSize:14,color:C.inkL,lineHeight:1.7,marginBottom:32}}>Tu espacio para ver, sin juicio, dónde va tu energía — y decidir con más consciencia.</p><button onClick={()=>setObStep(1)} style={{background:C.terra,color:"white",border:"none",borderRadius:100,padding:"14px 40px",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"'Nunito',sans-serif",boxShadow:"0 4px 20px #C97B4B44"}}>Empezar →</button></div>}
        {obStep===1&&<div><div style={{fontSize:40,marginBottom:16}}>💫</div><h2 style={{fontSize:21,fontWeight:600,color:C.ink,marginBottom:10}}>¿Qué significa para ti<br/><em style={{color:C.terra}}>tiempo de alto valor?</em></h2><p style={{fontSize:13,color:C.inkL,marginBottom:20,lineHeight:1.7}}>No hay respuesta correcta. Solo tú lo sabes.</p><textarea placeholder="Para mí, alto valor es..." value={obDef} onChange={e=>setObDef(e.target.value)} style={{width:"100%",minHeight:90,background:"white",border:"2px solid #EDE8DF",borderRadius:16,padding:"14px 16px",fontSize:14,color:C.ink,fontFamily:"'Nunito',sans-serif",outline:"none",resize:"none",lineHeight:1.6,marginBottom:16}}/><button onClick={finishOb} style={{background:C.terra,color:"white",border:"none",borderRadius:100,padding:"14px 40px",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"'Nunito',sans-serif",boxShadow:"0 4px 20px #C97B4B44",width:"100%"}}>Comenzar mi registro ✓</button></div>}
      </div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:C.cream,fontFamily:"'Nunito',sans-serif",color:C.ink,display:"flex",flexDirection:"column"}}>
      <style>{css}</style>
      <div style={{background:"linear-gradient(135deg,#C97B4BF2,#E8A97A)",padding:"24px 22px 0",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",right:-30,top:-30,width:130,height:130,borderRadius:"50%",background:"rgba(255,255,255,0.08)"}}/>
        <div style={{position:"relative"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}}>
            <div><div style={{fontFamily:"'Lora',serif",fontSize:20,fontWeight:600,color:"white"}}>Mapa de Tiempo</div><div style={{fontSize:11,color:"rgba(255,255,255,0.65)",letterSpacing:"0.08em",marginTop:2}}>TU TIEMPO, TU ELECCIÓN</div></div>
            {totalT>0&&<div style={{background:"rgba(255,255,255,0.15)",borderRadius:14,padding:"8px 14px",textAlign:"right"}}><div style={{fontSize:10,color:"rgba(255,255,255,0.7)",letterSpacing:"0.08em"}}>HOY</div><div style={{fontSize:20,fontWeight:800,color:"white"}}>{fmt(totalT)}</div></div>}
          </div>
          <div style={{display:"flex",gap:18,borderTop:"1px solid rgba(255,255,255,0.2)",paddingTop:2}}>
            {[["log","Registro"],["add","+ Añadir"],["quadrant","Mapa"]].map(([v,l])=>(
              <button key={v} className="nav" style={{color:view===v?"white":"rgba(255,255,255,0.55)",borderBottomColor:view===v?"white":"transparent"}} onClick={()=>setView(v)}>{l}</button>
            ))}
          </div>
        </div>
      </div>

      <div style={{padding:"20px 20px 48px",maxWidth:480,margin:"0 auto",width:"100%",flex:1}}>

        {view==="log"&&<div className="fu">
          {!activeTimer?<div className="card" style={{marginBottom:16,border:"2px solid #EDE8DF"}}>
            <div style={{fontSize:11,fontWeight:800,color:C.terra,letterSpacing:"0.08em",marginBottom:14}}>¿EN QUÉ ESTÁS AHORA?</div>
            <input className="inf" placeholder="Nombre de la actividad…" value={form.activity} onChange={e=>setForm(f=>({...f,activity:e.target.value}))} style={{marginBottom:10}}/>
            <select className="inf" value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))} style={{marginBottom:16}}>{CATS.map(c=><option key={c}>{c}</option>)}</select>
            <label className="lbl">¿ES DE ALTO O BAJO VALOR?</label>
            <div style={{display:"flex",gap:8,marginBottom:16}}><Pill label="✦ Alto valor" active={form.value==="high"} color={C.sage} onClick={()=>setForm(f=>({...f,value:"high"}))}/><Pill label="Bajo valor" active={form.value==="low"} color={C.rose} onClick={()=>setForm(f=>({...f,value:"low"}))}/></div>
            <label className="lbl">¿CÓMO VIVES ESTA ACTIVIDAD?</label>
            <div style={{display:"flex",gap:8,marginBottom:16}}>{ENERGY_OPTS.map(o=><CPill key={o.key} opt={o} active={form.energy===o.key} color={C.terra} onClick={()=>setForm(f=>({...f,energy:o.key}))}/>)}</div>
            <label className="lbl">¿CÓMO FUE TU ENFOQUE?</label>
            <div style={{display:"flex",gap:8,marginBottom:16}}>{FOCUS_OPTS.map(o=><CPill key={o.key} opt={o} active={form.focus===o.key} color={C.sky} onClick={()=>setForm(f=>({...f,focus:o.key}))}/>)}</div>
            <button className="bmain" onClick={startTimer} disabled={!form.activity.trim()}>▶ Iniciar temporizador</button>
          </div>:
          <div className="card fu" style={{marginBottom:16,background:"linear-gradient(135deg,#7A9E8718,#A8C5B012)",border:"2px solid #7A9E8744",textAlign:"center"}}>
            <div className="pu" style={{fontSize:11,color:C.sage,fontWeight:800,letterSpacing:"0.1em",marginBottom:8}}>● EN CURSO</div>
            <div style={{fontSize:17,fontWeight:700,color:C.ink,marginBottom:8}}>{activeTimer.activity}</div>
            <div style={{display:"flex",gap:6,justifyContent:"center",marginBottom:14,flexWrap:"wrap"}}>
              <Tag color={C.inkL} bg={C.mist}>{activeTimer.category}</Tag>
              <Tag color={activeTimer.value==="high"?C.sage:C.rose}>{activeTimer.value==="high"?"Alto valor":"Bajo valor"}</Tag>
              <Tag color={C.terra} bg={C.terra+"15"}>{ENERGY_OPTS.find(o=>o.key===activeTimer.energy)?.icon} {ENERGY_OPTS.find(o=>o.key===activeTimer.energy)?.label}</Tag>
            </div>
            <div style={{fontFamily:"'Lora',serif",fontSize:52,fontWeight:600,color:C.terra,letterSpacing:"-2px",lineHeight:1,marginBottom:16}}>{elFmt()}</div>
            <button className="bmain bstop" onClick={stopTimer}>■ Detener y guardar</button>
          </div>}
          <div style={{fontSize:11,fontWeight:800,color:C.inkL,letterSpacing:"0.08em",margin:"20px 0 10px"}}>HOY</div>
          {todayE.length===0&&<div style={{textAlign:"center",padding:"32px 0",color:C.inkL}}><div style={{fontSize:36,marginBottom:8}}>🌱</div><div style={{fontSize:14}}>Aún sin actividades hoy.</div><div style={{fontSize:13,color:C.terra,fontWeight:700,cursor:"pointer",marginTop:6}} onClick={()=>setView("add")}>Añadir manualmente →</div></div>}
          {todayE.map((e,i)=>{const z=ZONES[getZone(e.value,e.energy)];const fo=FOCUS_OPTS.find(o=>o.key===e.focus);return(
            <div key={e.id} className="card fu" style={{marginBottom:10,borderLeft:"4px solid "+z.color}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div style={{flex:1}}><div style={{fontSize:15,fontWeight:700,color:C.ink,marginBottom:7}}>{e.activity}</div>
                <div style={{display:"flex",gap:5,flexWrap:"wrap"}}><Tag color={C.inkL} bg={C.mist}>{e.category}</Tag><Tag color={z.color} bg={z.color+"18"}>{z.icon} {z.label}</Tag>{fo&&<Tag color={C.sky} bg={C.sky+"15"}>{fo.icon} {fo.label}</Tag>}<Tag color={C.inkL} bg={C.mist}>{fmt(getMins(e.startTime,e.endTime))}</Tag></div>
                {e.note&&<div style={{fontSize:12,color:C.inkL,marginTop:6,fontStyle:"italic"}}>{e.note}</div>}</div>
                <button className="dbtn" onClick={()=>del(e.id)}>×</button>
              </div>
            </div>
          )})}
          {entries.filter(e=>new Date(e.startTime).toDateString()!==todayStr()).length>0&&<>
            <div style={{fontSize:11,fontWeight:800,color:C.inkL,letterSpacing:"0.08em",margin:"24px 0 10px"}}>ANTERIORES</div>
            {entries.filter(e=>new Date(e.startTime).toDateString()!==todayStr()).slice(0,8).map(e=>{const z=ZONES[getZone(e.value,e.energy)];return(
              <div key={e.id} style={{background:"white",borderRadius:14,padding:"12px 14px",marginBottom:8,opacity:.75,display:"flex",justifyContent:"space-between",alignItems:"center",borderLeft:"3px solid "+z.color+"66"}}>
                <div><div style={{fontSize:14,fontWeight:600,color:C.ink}}>{e.activity}</div><div style={{display:"flex",gap:5,marginTop:5,flexWrap:"wrap"}}><Tag color={C.inkL} bg={C.mist}>{e.category}</Tag><Tag color={z.color} bg={z.color+"15"}>{z.icon} {z.label}</Tag><Tag color={C.inkL} bg={C.mist}>{new Date(e.startTime).toLocaleDateString("es",{day:"2-digit",month:"short"})}</Tag></div></div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}><span style={{fontSize:13,color:C.inkL,fontWeight:600}}>{fmt(getMins(e.startTime,e.endTime))}</span><button className="dbtn" onClick={()=>del(e.id)}>×</button></div>
              </div>
            )})}
          </>}
        </div>}

        {view==="add"&&<div className="fu"><div className="card" style={{border:"2px solid #EDE8DF"}}>
          <div style={{fontSize:11,fontWeight:800,color:C.terra,letterSpacing:"0.08em",marginBottom:16}}>AÑADIR ACTIVIDAD</div>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div><label className="lbl">ACTIVIDAD *</label><input className="inf" placeholder="¿Qué hiciste?" value={form.activity} onChange={e=>setForm(f=>({...f,activity:e.target.value}))}/></div>
            <div><label className="lbl">CATEGORÍA</label><select className="inf" value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}>{CATS.map(c=><option key={c}>{c}</option>)}</select></div>
            <div><label className="lbl">¿ES DE ALTO O BAJO VALOR?</label><div style={{display:"flex",gap:8}}><Pill label="✦ Alto valor" active={form.value==="high"} color={C.sage} onClick={()=>setForm(f=>({...f,value:"high"}))}/><Pill label="Bajo valor" active={form.value==="low"} color={C.rose} onClick={()=>setForm(f=>({...f,value:"low"}))}/></div></div>
            <div><label className="lbl">¿CÓMO VIVES ESTA ACTIVIDAD?</label><div style={{display:"flex",gap:8}}>{ENERGY_OPTS.map(o=><CPill key={o.key} opt={o} active={form.energy===o.key} color={C.terra} onClick={()=>setForm(f=>({...f,energy:o.key}))}/>)}</div></div>
            <div><label className="lbl">¿CÓMO FUE TU ENFOQUE?</label><div style={{display:"flex",gap:8}}>{FOCUS_OPTS.map(o=><CPill key={o.key} opt={o} active={form.focus===o.key} color={C.sky} onClick={()=>setForm(f=>({...f,focus:o.key}))}/>)}</div></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div><label className="lbl">INICIO *</label><input type="datetime-local" className="inf" value={form.startTime} onChange={e=>setForm(f=>({...f,startTime:e.target.value}))}/></div>
              <div><label className="lbl">FIN *</label><input type="datetime-local" className="inf" value={form.endTime} onChange={e=>setForm(f=>({...f,endTime:e.target.value}))}/></div>
            </div>
            <div><label className="lbl">NOTA (opcional)</label><input className="inf" placeholder="Algo que quieras recordar…" value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))}/></div>
            <button className="bmain" style={{marginTop:4}} onClick={addManual} disabled={!form.activity.trim()||!form.startTime||!form.endTime}>Guardar actividad ✓</button>
          </div>
        </div></div>}

        {view==="quadrant"&&<div className="fu">
          <div style={{marginBottom:18}}><div style={{fontFamily:"'Lora',serif",fontSize:20,fontWeight:600,color:C.ink,marginBottom:4}}>Tu mapa de actividades</div><div style={{fontSize:13,color:C.inkL,lineHeight:1.6}}>El tamaño de cada burbuja refleja el tiempo invertido.</div></div>
          {entries.length===0?<div style={{textAlign:"center",padding:"48px 0"}}><div style={{fontSize:40,marginBottom:12}}>🗺️</div><div style={{fontSize:15,color:C.inkL}}>Aún sin actividades registradas.</div><div style={{fontSize:13,color:C.terra,fontWeight:700,cursor:"pointer",marginTop:8}} onClick={()=>setView("log")}>← Empieza a registrar</div></div>:<>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
              {["potenciar","optimizar"].map(zk=>{const z=ZONES[zk];const d=zoneData[zk]||{mins:0,items:[]};const s=Math.max(0.12,d.mins/maxMins);return(
                <div key={zk} className="card" style={{background:z.bg,border:"2px solid "+z.color+"33",minHeight:120,display:"flex",flexDirection:"column",justifyContent:"space-between"}}>
                  <div><div style={{fontSize:20,marginBottom:3}}>{z.icon}</div><div style={{fontSize:13,fontWeight:700,color:z.color}}>{z.label}</div><div style={{fontSize:10,color:C.inkL,marginTop:2,lineHeight:1.4}}>{z.desc}</div></div>
                  <div style={{marginTop:10,display:"flex",alignItems:"center",gap:8}}><div style={{width:Math.round(14+s*44),height:Math.round(14+s*44),borderRadius:"50%",background:z.color,opacity:.7,flexShrink:0}}/><div><div style={{fontSize:17,fontWeight:800,color:z.color,lineHeight:1}}>{fmt(d.mins)}</div><div style={{fontSize:10,color:C.inkL}}>{d.items.length} act.</div></div></div>
                </div>
              )})}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:20}}>
              {["delegar","reducir","eliminar"].map(zk=>{const z=ZONES[zk];const d=zoneData[zk]||{mins:0,items:[]};const s=Math.max(0.12,d.mins/maxMins);return(
                <div key={zk} className="card" style={{background:z.bg,border:"2px solid "+z.color+"33",minHeight:110,display:"flex",flexDirection:"column",justifyContent:"space-between"}}>
                  <div><div style={{fontSize:18,marginBottom:3}}>{z.icon}</div><div style={{fontSize:12,fontWeight:700,color:z.color}}>{z.label}</div><div style={{fontSize:10,color:C.inkL,marginTop:2,lineHeight:1.3}}>{z.desc}</div></div>
                  <div style={{marginTop:8,display:"flex",alignItems:"center",gap:6}}><div style={{width:Math.round(12+s*36),height:Math.round(12+s*36),borderRadius:"50%",background:z.color,opacity:.7,flexShrink:0}}/><div><div style={{fontSize:15,fontWeight:800,color:z.color,lineHeight:1}}>{fmt(d.mins)}</div><div style={{fontSize:10,color:C.inkL}}>{d.items.length} act.</div></div></div>
                </div>
              )})}
            </div>
            {Object.entries(ZONES).map(([zk,z])=>{const d=zoneData[zk];if(!d||d.items.length===0)return null;return(
              <div key={zk} style={{marginBottom:14}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><span style={{fontSize:15}}>{z.icon}</span><span style={{fontSize:13,fontWeight:700,color:z.color}}>{z.label}</span><span style={{fontSize:12,color:C.inkL}}>— {fmt(d.mins)} en total</span></div>
              {d.items.sort((a,b)=>b.mins-a.mins).slice(0,4).map((e,i)=>{const fo=FOCUS_OPTS.find(o=>o.key===e.focus);return(
                <div key={i} style={{background:"white",borderRadius:12,padding:"10px 14px",marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center",borderLeft:"3px solid "+z.color}}>
                  <div style={{fontSize:13,fontWeight:600,color:C.ink}}>{e.activity}</div>
                  <div style={{display:"flex",gap:5,alignItems:"center"}}>{fo&&<Tag color={C.sky} bg={C.sky+"12"}>{fo.icon}</Tag>}<Tag color={z.color} bg={z.color+"15"}>{fmt(e.mins)}</Tag></div>
                </div>
              )})}
              </div>
            )})}
            {insights&&<div style={{background:"linear-gradient(135deg,#C97B4B10,#D4A85308)",border:"1px solid #C97B4B22",borderRadius:18,padding:18,marginTop:4}}>
              <div style={{fontSize:11,fontWeight:800,color:C.terra,letterSpacing:"0.08em",marginBottom:12}}>REFLEXIÓN PERSONALIZADA</div>
              {insights.map((item,i)=><div key={i} style={{fontFamily:"'Lora',serif",fontSize:14,color:C.ink,lineHeight:1.75,fontStyle:"italic",marginBottom:i<insights.length-1?12:0,paddingBottom:i<insights.length-1?12:0,borderBottom:i<insights.length-1?"1px solid #EDE8DF":"none"}}>{item}</div>)}
            </div>}
          </>}
        </div>}
      </div>

      <div style={{textAlign:"center",padding:"14px 24px 22px",borderTop:"1px solid #EDE8DF"}}>
        <span style={{fontSize:11,color:C.mist,letterSpacing:"0.06em"}}>© Camino & Esencia</span>
      </div>
    </div>
  );
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
